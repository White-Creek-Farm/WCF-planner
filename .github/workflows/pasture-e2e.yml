name: Pasture E2E

# The Pasture Map browser specs are heavy (Leaflet/Geoman draw + GPS + offline
# flows) and run serialized against the shared Supabase test DB. To avoid making
# EVERY PR wait on the full pasture browser suite, they run in this focused lane
# via the isolated playwright.pasture.config.js, and ONLY when pasture files /
# specs / migrations change. The root CI workflow (ci.yml) excludes these specs
# from its e2e (playwright.config.js testIgnore), so the two never double-run.
on:
  pull_request:
    paths:
      - 'src/pasture/**'
      - 'src/lib/pasture*'
      - 'tests/pasture_map_*'
      - 'supabase-migrations/*pasture*'
      - 'playwright.pasture.config.js'
      - '.github/workflows/pasture-e2e.yml'
  push:
    branches: [main]
    paths:
      - 'src/pasture/**'
      - 'src/lib/pasture*'
      - 'tests/pasture_map_*'
      - 'supabase-migrations/*pasture*'
      - 'playwright.pasture.config.js'
      - '.github/workflows/pasture-e2e.yml'

permissions:
  contents: read

# Shares the SINGLE Supabase test DB with ci.yml's verify job via the SAME
# concurrency group, so the two serialize and never race the truncate/reseed
# reset. Queue rather than cancel.
concurrency:
  group: wcf-test-db
  cancel-in-progress: false

jobs:
  pasture-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # Preserves the assertTestDatabase guard. Tests refuse to run without this.
      WCF_TEST_DATABASE: '1'
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      VITE_TEST_ADMIN_EMAIL: ${{ secrets.VITE_TEST_ADMIN_EMAIL }}
      VITE_TEST_ADMIN_PASSWORD: ${{ secrets.VITE_TEST_ADMIN_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Pasture Map E2E (isolated config)
        run: npx playwright test --config playwright.pasture.config.js

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pasture-playwright-report-${{ github.run_id }}
          path: |
            playwright-report/
            test-results/
          retention-days: 7
          if-no-files-found: ignore
